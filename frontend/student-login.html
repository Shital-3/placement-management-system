<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6a11cb,#8e44ff);
}

.card{
background:#fff;
width:400px;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.icon{
background:#7b4dff;
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 20px;
color:#fff;
font-size:28px;
}

h2{margin-bottom:10px;}
p{color:#666;margin-bottom:25px;}

.toggle{
display:flex;
background:#eee;
border-radius:25px;
margin-bottom:20px;
}

.toggle button{
flex:1;
padding:10px;
border:none;
background:none;
cursor:pointer;
font-weight:500;
}

.toggle .active{
background:#ddd;
border-radius:25px;
}

.input-group{
text-align:left;
margin-bottom:15px;
}

.input-group label{
font-size:14px;
}

.input-group input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:1px solid #ddd;
}

.login-btn{
width:100%;
padding:12px;
margin-top:20px;
border:none;
border-radius:25px;
background:linear-gradient(90deg,#6a11cb,#8e44ff);
color:white;
font-weight:600;
cursor:pointer;
}

.back{
margin-top:15px;
display:block;
color:#555;
text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<div class="icon">
<i class="fas fa-graduation-cap"></i>
</div>

<h2>Student Portal</h2>
<p>Access your placement journey</p>

<!-- TOGGLE -->
<div class="toggle">
<button id="loginTab" class="active">Login</button>
<button id="registerTab">Register</button>
</div>

<!-- LOGIN FORM -->
<form id="loginForm">

<div class="input-group">
<label>Email</label>
<input id="email" type="email" placeholder="student@gmail.com" required>
</div>

<div class="input-group">
<label>Password</label>
<input id="password" type="password" placeholder="••••••••" required>
</div>

<button type="submit" class="login-btn">Login</button>

</form>

<!-- REGISTER FORM -->
<form id="registerForm" style="display:none">

<div class="input-group">
<label>Name</label>
<input id="name" type="text" required>
</div>

<div class="input-group">
<label>Email</label>
<input id="registerEmail" type="email" required>
</div>

<div class="input-group">
<label>Password</label>
<input id="registerPassword" type="password" required>
</div>

<button type="submit" class="login-btn">Register</button>

</form>

<a href="index.html" class="back">← Back to Home</a>

</div>

<script>

const loginTab=document.getElementById("loginTab")
const registerTab=document.getElementById("registerTab")
const loginForm=document.getElementById("loginForm")
const registerForm=document.getElementById("registerForm")

loginTab.onclick=function(){
loginTab.classList.add("active")
registerTab.classList.remove("active")
loginForm.style.display="block"
registerForm.style.display="none"
}

registerTab.onclick=function(){
registerTab.classList.add("active")
loginTab.classList.remove("active")
loginForm.style.display="none"
registerForm.style.display="block"
}

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault()

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const formData=new URLSearchParams()
formData.append("username",email)
formData.append("password",password)

const res=await fetch("http://127.0.0.1:8000/login",{
method:"POST",
body:formData
})

const data=await res.json()

if(res.ok){

localStorage.setItem("token",data.access_token)

if(data.role==="student"){
window.location.href="student-dashboard.html"
}else{
alert("You are not a student")
}

}else{
alert("Login failed")
}

})

document.getElementById("registerForm").addEventListener("submit", async function(e){

e.preventDefault()

const name=document.getElementById("name").value
const email=document.getElementById("registerEmail").value
const password=document.getElementById("registerPassword").value

const res=await fetch("http://127.0.0.1:8000/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
email:email,
password:password,
role:"student"
})

})

const data=await res.json()

if(res.ok){
alert("Registration successful. Please login.")
loginTab.click()
}else{
alert(data.detail || "Registration failed")
}

})

</script>

</body>
</html>
